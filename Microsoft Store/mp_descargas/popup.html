<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            width: 340px;
            margin: 0;
            padding: 18px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 13px;
            color: #333;
        }

        h1 {
            font-size: 15px;
            margin: 0 0 2px 0;
            color: #00549f;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .subtitle {
            font-size: 11px;
            color: #888;
            margin: 0 0 14px 0;
        }

        .info {
            background: #f0f7ff;
            border: 1px solid #d6e8ff;
            border-radius: 6px;
            padding: 11px 12px;
            font-size: 12px;
            line-height: 1.5;
            color: #444;
        }

        .info strong {
            color: #00549f;
        }

        .info code {
            background: #e3eefb;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 11px;
        }

        .thanks {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 12px;
            line-height: 1.55;
            color: #666;
        }

        .thanks .heart {
            font-size: 14px;
        }

        .thanks a {
            display: inline-block;
            margin-top: 8px;
            padding: 9px 16px;
            background: #00549f;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            transition: background 0.2s;
        }

        .thanks a:hover {
            background: #0072ce;
        }
    </style>
</head>

<body>
    <h1>🛠️ MP Tools</h1>
    <p class="subtitle">Descarga masiva — Licitaciones (Comprobante de oferta)</p>

    <div class="info">
        Pulsa 📥 junto a cada oferta para descargar <strong>todos</strong> sus adjuntos en
        <code>Descargas/Licitacion_<código>/<proveedor>/</code>.
    </div>

    <div class="thanks">
        <p><span class="heart">🙏</span> ¡Gracias por usar MP Tools!</p>
        <p>Si necesitas más servicios como este, búscanos en</p>
        <a href="https://www.solvitu.com" id="solvituLink">www.solvitu.com</a>
    </div>

    <script src="popup.js"></script>
</body>

</html>
